# use `just docs` to build locally or on CI
# use `mkdocs serve` for live preview

site_name: cryptography-kotlin
site_author: Oleg Yukhnevich
site_description: "Type-safe Multi-platform cryptography kotlin library"
site_url: https://whyoleg.github.io/cryptography-kotlin/

repo_name: cryptography-kotlin
repo_url: https://github.com/whyoleg/cryptography-kotlin
edit_uri: edit/main/docs/
remote_branch: gh-pages

copyright: 'Copyright &copy; 2025 Oleg Yukhnevich'

exclude_docs:
  snippets/

nav:
  - 'Overview':
      - index.md
  - 'Getting Started':
      - getting-started/index.md
      - 'Choosing a Provider':
          - getting-started/providers/index.md
          - 'JDK': getting-started/providers/jdk.md
          - 'Apple': getting-started/providers/apple.md
          - 'WebCrypto': getting-started/providers/webcrypto.md
          - 'OpenSSL3': getting-started/providers/openssl3.md
      - 'Dependency Management': getting-started/dependency-management.md
      - 'Troubleshooting':
          - 'Xcode / Swift compatibility': getting-started/troubleshooting/xcode-compatibility.md
  - 'Primitives':
      - primitives/index.md
      - 'Working with Keys': primitives/keys.md
      - 'Operations':
          - primitives/operations/index.md
          - 'Hashing': primitives/operations/hashing.md
          - 'MAC': primitives/operations/mac.md
          - 'Digital Signatures': primitives/operations/digital-signatures.md
          - 'AEAD': primitives/operations/aead.md
          - 'Symmetric Encryption': primitives/operations/symmetric-encryption.md
          - 'Public-Key Encryption': primitives/operations/public-key-encryption.md
          - 'Key Agreement': primitives/operations/key-agreement.md
          - 'Key Derivation': primitives/operations/key-derivation.md
      - 'Recipes':
          - 'Secure Messaging': primitives/recipes/secure-messaging.md
          - 'Password-Based Encryption': primitives/recipes/password-based-encryption.md
          - 'Hybrid Encryption': primitives/recipes/hybrid-encryption.md
  - 'Changelog': changelog.md
  - 'API': api/index.html

theme:
  name: 'material'
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: 'white'
      accent: 'deep purple'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: 'black'
      accent: 'deep purple'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: 'Inter'
    code: 'JetBrains Mono'
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.path
    - navigation.sections
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips

markdown_extensions:
  - abbr
  - smarty
  - tables
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [ 'docs/snippets' ]
  - pymdownx.superfences
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.emoji: # for emoji shortcuts with :name: syntax
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search
  - social
  - optimize
  - privacy:
      links_attr_map:
        target: _blank

extra:
  social:
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/why_oleg
    - icon: fontawesome/brands/telegram
      link: https://t.me/why_oleg
    - icon: fontawesome/brands/patreon
      link: https://patreon.com/why_oleg
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/whyoleg/
