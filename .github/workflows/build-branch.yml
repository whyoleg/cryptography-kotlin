name: Build branch
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - samples/**
    branches-ignore:
      - main
      - kotlin-eap/*

jobs:
  checks:
    uses: ./.github/workflows/run-checks.yml

  publish:
    needs: [ checks ]
    uses: ./.github/workflows/publish-test.yml
    secrets: inherit
